name: test-pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      redis_changed: ${{ steps.filter.outputs.redis }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            redis:
              - 'Dockerfile.redis'

  node-build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        project: [ui, server]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [node-build, detect-changes]

    steps:
      - uses: actions/checkout@v4

      - name: Build UI image
        run: echo "Building UI image..."

      - name: Build Server image
        run: echo "Building Server image..."

      - name: Build Redis image (only if Dockerfile.redis changed)
        if: needs.detect-changes.outputs.redis_changed == 'true'
        run: echo "Building Redis image..."
