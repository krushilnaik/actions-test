name: test-pipeline

on:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      redis_changed: ${{ steps.filter.outputs.redis }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            redis:
              - 'Dockerfile.redis'

  ci-ui:
    uses: krushilnaik/workflow-template/.github/workflows/reusable-ci.yml@master
    with:
      node-version: "22"

  ci-server:
    uses: krushilnaik/workflow-template/.github/workflows/reusable-ci.yml@master
    with:
      node-version: "22"

  docker-build:
    runs-on: ubuntu-latest
    needs: [ci-ui, ci-server, detect-changes]

    steps:
      - uses: actions/checkout@v4

      - name: Build UI image
        run: echo "Building UI image..."

      - name: Build Server image
        run: echo "Building Server image..."

      - name: Build Redis image (only if Dockerfile.redis changed)
        if: needs.detect-changes.outputs.redis_changed == 'true'
        run: echo "Building Redis image..."
